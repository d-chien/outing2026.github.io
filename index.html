<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">載入中...</title>
    <link rel="icon" href="Logo_Black_Fish.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #374151; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #a0a0a0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #808080; }
        @media (min-width: 300px) {
            .show-on-300-plus { display: block !important; }
            .hide-on-300-plus { display: none !important; }
        }
    </style>
</head>
<body class="antialiased">
    <div class="min-h-screen flex flex-col items-center py-8 px-4 sm:px-6 lg:px-8">

        <header class="w-full max-w-4xl bg-white rounded-xl shadow-lg p-6 mb-8 flex justify-center items-center">
            <div class="h-20 w-full flex items-center justify-center rounded-lg text-gray-500 text-lg">
                <img src="Logo_Black_Fish.png" alt="Church Logo" class="hidden show-on-300-plus h-full max-h-15 w-auto object-contain">
                <span id="header-title" class="font-semibold text-xs sm:text-base md:text-lg lg:text-xl xl:text-2xl text-center px-2"></span>
            </div>
        </header>

        <main class="w-full max-w-4xl space-y-8">

            <!-- 活動行程 -->
            <section id="schedule" class="bg-white rounded-xl shadow-lg p-6">
                <h2 id="schedule-title" class="text-3xl font-bold text-center text-indigo-700 mb-6 border-b-2 border-indigo-200 pb-3"></h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-indigo-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider rounded-tl-lg">時間</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider rounded-tr-lg">活動內容</th>
                            </tr>
                        </thead>
                        <tbody id="schedule-body" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </section>

            <!-- 報名及其他資訊 -->
            <section id="notes" class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-3xl font-bold text-center text-indigo-700 mb-6 border-b-2 border-indigo-200 pb-3">報名及其他資訊</h2>
                <div class="prose max-w-none text-gray-700">
                    <p id="notes-intro" class="mb-4"></p>
                    <ul id="notes-list" class="list-disc list-inside space-y-2 mb-4"></ul>
                    <p id="notes-closing" class="text-center text-gray-600 font-medium mt-6"></p>
                </div>
            </section>

            <!-- 用餐資訊 -->
            <section id="meals" class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-3xl font-bold text-center text-indigo-700 mb-6 border-b-2 border-indigo-200 pb-3">用餐資訊</h2>
                <div class="text-center mb-6">
                    <p id="meals-intro" class="text-lg mb-4"></p>
                    <div id="meals-list"></div>
                    <p id="meals-reminder" class="text-sm text-gray-500 mt-4"></p>
                </div>
            </section>

            <!-- 環境照片 -->
            <section id="photos" class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-3xl font-bold text-center text-indigo-700 mb-6 border-b-2 border-indigo-200 pb-3">環境照片</h2>
                <div id="photos-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </section>

        </main>

        <footer class="w-full max-w-4xl text-center text-gray-500 text-sm mt-12 py-4 border-t border-gray-200">
            <p id="footer-text"></p>
        </footer>
    </div>

    <!-- 圖片放大視窗 -->
    <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 hidden p-4">
        <div class="relative bg-white rounded-lg p-4 max-w-3xl max-h-full overflow-auto">
            <button id="closeModal" class="absolute top-1 right-1 text-gray-800 hover:text-gray-600 text-3xl font-bold leading-none">&times;</button>
            <img id="modalImage" src="" alt="" class="max-w-full max-h-[100vh] mx-auto rounded-lg">
            <p id="modalCaption" class="text-center text-gray-700 mt-2 text-lg font-semibold"></p>
        </div>
    </div>

    <script>
    /* ===================================================================
       資料設定區 — 每次更換活動只需修改這個區塊，不需要動下方的程式碼
       =================================================================== */
    let EVENT = {
        /* 頁面標題與頁首文字 */
        title: "2025 劍橋教會野外禮拜活動",

        /* 活動行程：date 顯示於區塊標題，items 為各行程項目 */
        schedule: {
            date: "9/21",
            items: [
                { time: "08:00 - 08:30", activity: "報到與集合(百齡國小正門口)" },
                { time: "08:30 - 10:30", activity: "交通：前往新竹公園教會" },
                { time: "10:30 - 12:00", activity: "參加新竹公園教會台語禮拜" },
                { time: "12:00 - 13:30", activity: "交通：前往新竹公園及餐廳，午餐時間" },
                {
                    time: "13:30 - 15:30",
                    activity: "觀光導覽(玻璃展演)及自由活動<br>新竹公園內有動物園，可以自費前往參觀"
                },
                { time: "15:30 - 17:00", activity: "交通：回到百齡國小" }
            ]
        },

        /* 報名及其他資訊 */
        notes: {
            intro: "感謝您對本次野外禮拜的興趣！請注意以下重要事項：",
            items: [
                { label: "活動時間", text: "2025.09.21" },
                { label: "報名方式", text: "請於8/31前向財務組登記報名，如有要登記名佳鄉或好室鍋物也請一併登記。" },
                { label: "活動費用", text: "大人均一價100元，學生持學生證報名免費。" },
                { label: "交通方式", text: "報名時可同步登記乘坐遊覽車，或自行開車前往。" },
                { label: "聯絡方式", text: "如有任何疑問，請聯繫 陳慶鐘 長老。" }
            ],
            closing: "期待與您一同參加！"
        },

        /* 用餐資訊：
           type 可填 "order"（代訂）或 "self"（自行訂位）
           images 為空陣列則不顯示圖片區 */
        meals: {
            intro: "本次野外禮拜提供代訂美味午餐，請於報名時同步告知是否需要代訂午餐。",
            restaurants: [
                {
                    name: "午餐代訂1：名佳鄉",
                    type: "order",
                    images: [
                        { src: "Media/Res4_1.png", alt: "名佳鄉外觀" },
                        { src: "Media/Res4_2.png", alt: "名佳鄉菜單" },
                        { src: "Media/Res4_3.png", alt: "名佳鄉菜單" }
                    ]
                },
                {
                    name: "午餐代訂2：好室鍋物",
                    type: "order",
                    images: [
                        { src: "Media/Res2_1.png", alt: "好室鍋物外觀" },
                        { src: "Media/Res2_2.png", alt: "好室鍋物菜單" }
                    ]
                },
                {
                    name: "自行訂位：叉子餐廳",
                    type: "self",
                    images: []
                }
            ],
            reminder: "請務必在活動前三天完成餐點預訂，謝謝！"
        },

        /* 環境照片 */
        photos: [
            { src: "Media/Park1.png", alt: "新竹公園地圖" },
            { src: "Media/Park2.png", alt: "新竹公園景觀" },
            { src: "Media/Park3.png", alt: "新竹公園景觀" },
            { src: "Media/Park4.png", alt: "新竹公園景觀" }
        ],

        /* 頁腳 */
        footer: "© 台灣基督長老教會劍橋教會. 保留所有權利。"
    };
    /* ===================================================================
       以下為渲染程式碼，更換活動資料時不需要修改
       =================================================================== */

    function render() {
        // 頁面標題
        document.getElementById('page-title').textContent = EVENT.title;
        document.getElementById('header-title').textContent = EVENT.title;

        // 行程表
        document.getElementById('schedule-title').textContent = `活動行程(${EVENT.schedule.date})`;
        const tbody = document.getElementById('schedule-body');
        tbody.innerHTML = EVENT.schedule.items.map(item => `
            <tr>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${item.time}</td>
                <td class="px-6 py-4 text-sm text-gray-700">${item.activity}</td>
            </tr>
        `).join('');

        // 報名資訊
        document.getElementById('notes-intro').textContent = EVENT.notes.intro;
        document.getElementById('notes-list').innerHTML = EVENT.notes.items.map(item =>
            `<li><strong>${item.label}：</strong>${item.text}</li>`
        ).join('');
        document.getElementById('notes-closing').textContent = EVENT.notes.closing;

        // 用餐資訊
        document.getElementById('meals-intro').textContent = EVENT.meals.intro;
        const mealsList = document.getElementById('meals-list');
        mealsList.innerHTML = EVENT.meals.restaurants.map((r, i) => {
            const isFirst = i === 0;
            const titleMargin = isFirst ? 'mb-3' : 'mb-3 mt-6';
            const imgs = r.images.length > 0 ? `
                <div class="flex flex-wrap justify-center gap-4 mt-3">
                    ${r.images.map(img => `
                        <div class="mt-3 flex justify-center">
                            <img src="${img.src}" alt="${img.alt}"
                                 class="w-full h-48 object-cover transition-transform duration-300 group-hover:scale-105 cursor-pointer">
                        </div>
                    `).join('')}
                </div>` : '';
            return `
                <h3 class="text-3xl font-bold text-center text-indigo-700 ${titleMargin} border-b-2 border-indigo-200 pb-3">${r.name}</h3>
                ${imgs}
            `;
        }).join('');
        document.getElementById('meals-reminder').textContent = EVENT.meals.reminder;

        // 環境照片
        const photosGrid = document.getElementById('photos-grid');
        photosGrid.innerHTML = EVENT.photos.map(photo => `
            <div class="relative group rounded-lg overflow-hidden shadow-md">
                <img src="${photo.src}" alt="${photo.alt}"
                     class="w-full h-48 object-cover transition-transform duration-300 group-hover:scale-105 cursor-pointer">
            </div>
        `).join('');

        // 頁腳
        document.getElementById('footer-text').textContent = EVENT.footer;
    }

    document.addEventListener('DOMContentLoaded', function() {
        render();

        // 圖片放大視窗
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');
        const closeModal = document.getElementById('closeModal');

        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'IMG' && (e.target.closest('#photos') || e.target.closest('#meals'))) {
                modalImage.src = e.target.src;
                modalImage.alt = e.target.alt;
                modalCaption.textContent = e.target.alt;
                imageModal.classList.remove('hidden');
            }
        });

        closeModal.addEventListener('click', () => imageModal.classList.add('hidden'));
        imageModal.addEventListener('click', e => {
            if (e.target === imageModal) imageModal.classList.add('hidden');
        });
    });
    </script>
    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
    // 從 Firestore 載入已發布的活動資料，成功則覆蓋預設值並重新渲染
    (async function loadLiveData() {
        try {
            firebase.initializeApp(FIREBASE_CONFIG);
            const db = firebase.firestore();
            const snap = await db.collection('events').doc('current').get();
            if (snap.exists) {
                EVENT = snap.data();
                render();
            }
        } catch (e) {
            // Firestore 未設定或網路錯誤時靜默降級，使用 index.html 內建預設值
            console.warn('[Firebase] 無法載入線上資料，使用內建預設值', e);
        }
    })();
    </script>
</body>
</html>
